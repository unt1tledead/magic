<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магический Бой</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0d0c0a;color:#c8b88a;font-family:'Rajdhani',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(120,80,20,0.15) 0%,transparent 60%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,0.01) 40px,rgba(255,255,255,0.01) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.01) 40px,rgba(255,255,255,0.01) 41px);
}
.game{width:380px;display:flex;flex-direction:column;}
.header{background:linear-gradient(180deg,#1a1610,#120f0a);border:1px solid #3d2e10;border-bottom:2px solid #c8961e;padding:10px 16px 8px;text-align:center;position:relative;}
.header::before,.header::after{content:'◈';position:absolute;top:50%;transform:translateY(-50%);color:#c8961e;font-size:1rem;opacity:0.6;}
.header::before{left:12px;}.header::after{right:12px;}
.title{font-family:'Orbitron',monospace;font-size:1rem;letter-spacing:4px;color:#e8c96a;text-shadow:0 0 20px rgba(200,150,30,0.5);text-transform:uppercase;}
.main-panel{background:linear-gradient(180deg,#120f0a,#0d0c0a);border:1px solid #3d2e10;border-top:none;padding:14px;display:flex;flex-direction:column;gap:10px;}
.fighters{display:flex;align-items:center;gap:8px;}
.fighter{flex:1;}
.fighter-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.fighter.enemy .fighter-top{flex-direction:row-reverse;}
.f-icon{font-size:2rem;line-height:1;filter:drop-shadow(0 0 8px rgba(200,150,30,0.4));}
.f-info{flex:1;}
.fighter.enemy .f-info{text-align:right;}
.f-name{font-size:0.7rem;letter-spacing:3px;color:#8a7040;text-transform:uppercase;font-weight:700;}
.f-hp-num{font-size:1rem;font-weight:700;color:#e8c96a;font-family:'Orbitron',monospace;line-height:1;}
.hp-track{height:6px;background:#1a1510;border:1px solid #3d2e10;overflow:hidden;}
.hp-fill{height:100%;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);position:relative;}
.hp-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.3);}
.p-fill{background:linear-gradient(90deg,#1a6b2a,#2dbe4a);}
.e-fill{background:linear-gradient(90deg,#8b1a1a,#d63333);}
.hp-fill.low{animation:hpPulse 0.8s infinite alternate;}
@keyframes hpPulse{to{opacity:0.5;}}
.vs-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.vs-text{font-family:'Orbitron',monospace;font-size:0.65rem;color:#c8961e;letter-spacing:2px;text-shadow:0 0 10px rgba(200,150,30,0.5);}
.vs-divider{width:1px;height:24px;background:linear-gradient(180deg,transparent,#c8961e,transparent);}
.mana-row{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#0a0908;border:1px solid #2a1f08;}
.mana-label{font-size:0.6rem;letter-spacing:2px;color:#5a4a20;text-transform:uppercase;font-weight:700;}
.crystals{display:flex;gap:4px;flex:1;}
.cr{width:13px;height:17px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:#1a1408;transition:all 0.3s;}
.cr.on{background:linear-gradient(180deg,#5a3aed,#3a1aad);box-shadow:0 0 8px rgba(90,58,237,0.7);}
.mana-num{font-family:'Orbitron',monospace;font-size:0.7rem;color:#7a5aff;}
.boost-bar{text-align:center;font-size:0.65rem;letter-spacing:2px;color:#ffd700;text-shadow:0 0 10px #ffd700;padding:4px;border:1px solid rgba(255,215,0,0.3);background:rgba(255,215,0,0.05);display:none;}
.boost-bar.show{display:block;}
.log-panel{background:#080706;border:1px solid #2a1f08;border-left:3px solid #c8961e;padding:8px 12px;font-size:0.8rem;min-height:48px;line-height:1.6;color:#a09060;font-weight:500;}
.log-panel .d{color:#e05050;font-weight:700;}
.log-panel .h{color:#40c060;font-weight:700;}
.log-panel .s{color:#e8c96a;font-weight:700;}
.log-panel .b{color:#ffd700;font-weight:700;}
.spells-panel{background:#0a0908;border:1px solid #3d2e10;padding:10px;display:flex;flex-direction:column;gap:6px;}
.spells-label{font-size:0.6rem;letter-spacing:3px;color:#5a4a20;text-transform:uppercase;font-weight:700;margin-bottom:2px;}
.spells{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.sp{background:linear-gradient(180deg,#1a1610,#120f0a);border:1px solid #3d2e10;border-bottom:2px solid #2a1f08;padding:9px 6px 7px;cursor:pointer;transition:all 0.15s;font-family:'Rajdhani',sans-serif;color:#c8b88a;position:relative;overflow:hidden;text-align:center;}
.sp::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(200,150,30,0.05),transparent);opacity:0;transition:opacity 0.15s;}
.sp:hover:not(:disabled)::before{opacity:1;}
.sp:hover:not(:disabled){border-color:#c8961e;transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,150,30,0.15);}
.sp:disabled{opacity:0.3;cursor:not-allowed;}
.sp.on-cd{border-color:#4a1a1a;border-bottom-color:#3a0a0a;}
.sp.boosted{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.3);}
.sp-icon{font-size:1.4rem;display:block;margin-bottom:3px;}
.sp-name{font-size:0.58rem;letter-spacing:1px;display:block;margin-bottom:2px;text-transform:uppercase;font-weight:700;}
.sp-cost{font-size:0.5rem;color:#5a4a20;}
.sp-cost .mc{color:#7a5aff;}
.cd-badge{position:absolute;top:3px;right:3px;background:#8b1a1a;color:#ff8080;font-size:0.55rem;font-weight:700;border-radius:2px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;}
.history{font-size:0.58rem;letter-spacing:1px;color:#3a2e10;text-align:center;padding:4px;min-height:18px;}
.bottom-bar{display:flex;border:1px solid #3d2e10;border-top:2px solid #c8961e;}
.restart-btn{flex:1;background:linear-gradient(180deg,#1a1610,#120f0a);border:none;border-right:1px solid #3d2e10;padding:9px;color:#c8961e;font-family:'Rajdhani',sans-serif;font-size:0.65rem;letter-spacing:3px;cursor:pointer;text-transform:uppercase;font-weight:700;transition:all 0.15s;}
.restart-btn:hover{background:#1a1510;color:#e8c96a;}
.turn-badge{padding:9px 14px;background:#0a0908;font-size:0.55rem;letter-spacing:2px;color:#5a4a20;text-transform:uppercase;display:flex;align-items:center;font-weight:700;}
.turn-badge.player{color:#2dbe4a;}
.turn-badge.enemy-turn{color:#d63333;}
</style>
</head>
<body>
<div class="game">
  <div class="header"><div class="title">Магический Бой</div></div>
  <div class="main-panel">
    <div class="fighters">
      <div class="fighter player">
        <div class="fighter-top">
          <div class="f-icon">🧙</div>
          <div class="f-info"><div class="f-name">Маг</div><div class="f-hp-num" id="pHpNum">100</div></div>
        </div>
        <div class="hp-track"><div class="hp-fill p-fill" id="pBar" style="width:100%"></div></div>
      </div>
      <div class="vs-col"><div class="vs-divider"></div><div class="vs-text">VS</div><div class="vs-divider"></div></div>
      <div class="fighter enemy">
        <div class="fighter-top">
          <div class="f-icon">👹</div>
          <div class="f-info"><div class="f-name">Враг</div><div class="f-hp-num" id="eHpNum">100</div></div>
        </div>
        <div class="hp-track"><div class="hp-fill e-fill" id="eBar" style="width:100%"></div></div>
      </div>
    </div>
    <div class="mana-row">
      <span class="mana-label">Мана</span>
      <div class="crystals" id="crystals"></div>
      <span class="mana-num" id="manaNum">5/5</span>
    </div>
    <div class="boost-bar" id="boostBar">🌀 УСКОРЕНИЕ — следующее заклинание бесплатно!</div>
    <div class="log-panel" id="log">Выбери заклинание для атаки...</div>
  </div>
  <div class="spells-panel">
    <div class="spells-label">Заклинания</div>
    <div class="spells">
      <button class="sp" data-type="fire" onclick="cast('fire')"><span class="sp-icon">🔥</span><span class="sp-name">Огонь</span><span class="sp-cost"><span class="mc">◆1</span> · 15-25</span></button>
      <button class="sp" data-type="ice" onclick="cast('ice')"><span class="sp-icon">❄️</span><span class="sp-name">Заморозка</span><span class="sp-cost"><span class="mc">◆2</span> · стан</span></button>
      <button class="sp" data-type="storm" onclick="cast('storm')"><span class="sp-icon">⚡</span><span class="sp-name">Молния</span><span class="sp-cost"><span class="mc">◆2</span> · 20-35</span></button>
      <button class="sp" data-type="heal" onclick="cast('heal')"><span class="sp-icon">💚</span><span class="sp-name">Лечение</span><span class="sp-cost"><span class="mc">◆2</span> · +25 HP</span></button>
      <button class="sp" data-type="boost" onclick="cast('boost')"><span class="sp-icon">🌀</span><span class="sp-name">Ускорение</span><span class="sp-cost"><span class="mc">◆1</span> · бесплатно</span></button>
      <button class="sp" data-type="combo" onclick="cast('combo')"><span class="sp-icon">✨</span><span class="sp-name">Комбо</span><span class="sp-cost"><span class="mc">◆3</span> · 40-60</span></button>
    </div>
    <div class="history" id="history"></div>
  </div>
  <div class="bottom-bar">
    <button class="restart-btn" onclick="init()">⟳ Новая игра</button>
    <div class="turn-badge player" id="turnBadge">Твой ход</div>
  </div>
</div>
<script>
let s={};
function r(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
const COSTS={fire:1,ice:2,storm:2,heal:2,boost:1,combo:3};
const CDS={fire:2,ice:3,storm:2,heal:3,boost:3,combo:4};
const ICONS={fire:'🔥',ice:'❄️',storm:'⚡',heal:'💚',boost:'🌀',combo:'✨'};
function init(){
  s={php:100,ehp:100,mana:5,maxMana:5,pTurn:true,over:false,eFrozen:0,pBurn:0,eBurn:0,eShield:false,boosted:false,
     cds:{fire:0,ice:0,storm:0,heal:0,boost:0,combo:0},hist:[]};
  render();
  document.getElementById('log').innerHTML='Выбери заклинание для атаки...';
}
function log(html){document.getElementById('log').innerHTML=html;}
function render(){
  const pp=Math.max(0,s.php),ep=Math.max(0,s.ehp);
  document.getElementById('pBar').style.width=pp+'%';
  document.getElementById('eBar').style.width=ep+'%';
  document.getElementById('pHpNum').textContent=pp;
  document.getElementById('eHpNum').textContent=ep;
  document.getElementById('pBar').classList.toggle('low',pp<30);
  document.getElementById('eBar').classList.toggle('low',ep<30);
  const cr=document.getElementById('crystals');
  cr.innerHTML='';
  for(let i=0;i<s.maxMana;i++) cr.innerHTML+=`<div class="cr ${i<s.mana?'on':''}"></div>`;
  document.getElementById('manaNum').textContent=s.mana+'/'+s.maxMana;
  document.getElementById('boostBar').classList.toggle('show',s.boosted);
  document.querySelectorAll('.sp').forEach(b=>{
    const t=b.dataset.type,cd=s.cds[t]||0;
    const cost=s.boosted&&t!=='boost'?0:COSTS[t];
    b.disabled=!s.pTurn||s.over||cd>0||cost>s.mana;
    b.classList.toggle('on-cd',cd>0);
    b.classList.toggle('boosted',s.boosted&&t!=='boost'&&cd===0);
    const old=b.querySelector('.cd-badge');if(old)old.remove();
    if(cd>0){const d=document.createElement('div');d.className='cd-badge';d.textContent=cd;b.appendChild(d);}
  });
  const tb=document.getElementById('turnBadge');
  tb.textContent=s.pTurn?'Твой ход':'Ход врага';
  tb.className='turn-badge '+(s.pTurn?'player':'enemy-turn');
  if(s.hist.length) document.getElementById('history').textContent='История: '+s.hist.slice(-6).join(' → ');
}
function checkOver(){
  if(s.ehp<=0){log('🏆 <span class="s">ПОБЕДА! Враг повержен!</span>');s.over=true;return true;}
  if(s.php<=0){log('💀 <span class="d">ПОРАЖЕНИЕ! Ты пал в бою...</span>');s.over=true;return true;}
  return false;
}
function tickCDs(){for(const k in s.cds)if(s.cds[k]>0)s.cds[k]--;}
function cast(type){
  if(!s.pTurn||s.over)return;
  const cd=s.cds[type]||0;
  if(cd>0){log(`⏳ Перезарядка ещё <span class="d">${cd}</span> ход(а)!`);return;}
  const cost=s.boosted&&type!=='boost'?0:COSTS[type];
  if(cost>s.mana){log('❌ <span class="d">Недостаточно маны!</span>');return;}
  s.mana-=cost;
  if(s.boosted&&type!=='boost') s.boosted=false;
  s.cds[type]=CDS[type];
  s.hist.push(ICONS[type]);
  if(s.hist.length>6)s.hist.shift();
  let msg='';
  if(type==='fire'){const d=r(15,25);s.ehp-=d;s.eBurn=2;msg=`🔥 <span class="s">Огненный шар</span> — <span class="d">${d} урона</span>. Враг горит 2 хода.`;}
  else if(type==='ice'){const d=r(8,14);s.ehp-=d;s.eFrozen=1;msg=`❄️ <span class="s">Заморозка</span> — <span class="d">${d} урона</span>. Враг пропустит ход.`;}
  else if(type==='storm'){const d=r(20,35);s.ehp-=d;msg=`⚡ <span class="s">Молния</span> — <span class="d">${d} урона</span>!`;}
  else if(type==='heal'){const h=Math.min(25,100-s.php);s.php+=h;msg=`💚 <span class="s">Исцеление</span> — <span class="h">+${h} HP</span>.`;}
  else if(type==='boost'){s.boosted=true;msg=`🌀 <span class="b">Ускорение активировано!</span> Следующее заклинание бесплатно.`;}
  else if(type==='combo'){const d=r(40,60);s.ehp-=d;msg=`✨ <span class="b">КОМБО-УДАР</span> — <span class="d">${d} урона!</span>`;}
  log(msg);render();
  if(checkOver())return;
  s.pTurn=false;render();
  setTimeout(enemyTurn,1300);
}
function enemyTurn(){
  if(s.over)return;
  let extra='';
  if(s.eBurn>0){const bd=r(5,10);s.ehp-=bd;s.eBurn--;extra+=` 🔥 Горение: <span class="d">-${bd} HP</span>.`;if(checkOver())return;}
  if(s.eFrozen>0){s.eFrozen--;tickCDs();log(`❄️ Враг заморожен — пропускает ход!${extra}`);s.mana=Math.min(s.maxMana,s.mana+1);s.pTurn=true;render();return;}
  if(s.pBurn>0){const bd=r(5,10);s.php-=bd;s.pBurn--;extra+=` 🔥 Ты горишь: <span class="d">-${bd} HP</span>.`;if(checkOver())return;}
  const acts=['attack','attack','heavy','drain','shield','double'];
  const act=acts[r(0,acts.length-1)];
  let msg='';
  if(act==='attack'){let d=r(10,20);if(s.eShield){d=Math.floor(d*0.5);s.eShield=false;}s.php-=d;msg=`👹 Враг атакует — <span class="d">${d} урона</span>.`;}
  else if(act==='heavy'){let d=r(20,30);if(s.eShield){d=Math.floor(d*0.5);s.eShield=false;}s.php-=d;s.pBurn=1;msg=`👹 Огненный удар — <span class="d">${d} урона</span>. Ты горишь!`;}
  else if(act==='drain'){const steal=Math.min(1,s.mana);s.mana-=steal;const d=r(8,15);s.php-=d;msg=`👹 Похищение маны — <span class="d">${d} урона</span>, украдено <span class="d">${steal} маны</span>.`;}
  else if(act==='shield'){s.eShield=true;msg=`🛡️ Враг уходит в защиту — следующая атака ослаблена.`;}
  else if(act==='double'){const d1=r(6,12),d2=r(6,12);s.php-=d1+d2;msg=`👹 Двойной удар — <span class="d">${d1}</span> + <span class="d">${d2} урона</span>!`;}
  tickCDs();s.mana=Math.min(s.maxMana,s.mana+1);
  log(msg+extra);render();
  if(checkOver())return;
  s.pTurn=true;render();
}
init();
</script>
</body>
</html>
