<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOIR CASINO</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#111;--surface2:#181818;--border:#222;--gold:#d4a843;--gold2:#f0c060;--text:#e8e0d0;--muted:#666;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}
.header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;letter-spacing:4px;color:var(--gold);}
.logo span{color:var(--text);opacity:0.3;}
.balance-chip{background:var(--surface2);border:1px solid var(--border);padding:6px 14px;text-align:right;}
.amt{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);}
.lbl{font-size:0.5rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.nav{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:11px 10px;font-size:0.55rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:none;font-family:'Montserrat',sans-serif;transition:all 0.2s;border-bottom:2px solid transparent;white-space:nowrap;}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.screen{display:none;padding:14px;}
.screen.active{display:block;}

/* БЛОК СТАВОК */
.bet-control-panel{background:var(--surface);border:1px solid var(--border);padding:12px;margin-bottom:12px;}
.bet-input-row{display:flex;gap:8px;margin-bottom:10px;}
.bet-input-wrapper{flex:1;position:relative;}
.bet-input{width:100%;background:#000;border:1px solid var(--border);padding:10px;color:var(--gold);font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.9rem;outline:none;}
.bet-input:focus{border-color:var(--gold);}
.bet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;}
.bet-action-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.b-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 0;font-size:0.65rem;font-weight:600;cursor:pointer;transition:0.2s;}
.b-btn:active{background:var(--border);}
.b-btn.special{color:var(--gold);border-color:var(--gold);}
.b-btn.reset{color:#e74c3c;}

.main-btn{width:100%;background:linear-gradient(180deg,var(--gold2),var(--gold));border:none;padding:14px;font-family:'Playfair Display',serif;font-size:1rem;letter-spacing:3px;color:#000;cursor:pointer;font-weight:900;text-transform:uppercase;}
.main-btn:disabled{opacity:0.3;cursor:not-allowed;}
.result-msg{text-align:center;font-size:0.8rem;min-height:26px;color:var(--muted);margin:10px 0;}
.result-msg.win{color:var(--gold);font-weight:700;font-size:1rem;}
.result-msg.lose{color:#e74c3c;}

/* КАРТИНКИ И ЭЛЕМЕНТЫ ИГР */
.panel{background:var(--surface);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
.reels{display:flex;gap:6px;margin-bottom:14px;}
.reel{flex:1;background:#0a0a0a;border:1px solid var(--border);height:80px;display:flex;align-items:center;justify-content:center;font-size:2rem;}
.wheel-container{display:flex;justify-content:center;margin-bottom:10px;}
.r-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;text-align:center;}
.r-num.red{color:#e74c3c;}.r-num.black{color:#999;}.r-num.green-c{color:#2ecc71;}
.bet-types{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.btype{background:var(--surface2);border:1px solid var(--border);padding:10px 2px;text-align:center;cursor:pointer;font-size:0.6rem;}
.btype.sel{border-color:var(--gold);background:rgba(212,168,67,0.1);}

/* MINER */
.miner-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.mine-cell{aspect-ratio:1;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;}
.mine-cell.opened.safe{background:rgba(46,204,113,0.2);border-color:#2ecc71;}
.mine-cell.opened.bomb{background:rgba(231,76,60,0.3);border-color:#e74c3c;}
.cashout-btn{width:100%;background:linear-gradient(180deg,#2ecc71,#1a7a3a);border:none;padding:12px;color:#fff;font-weight:700;margin-bottom:8px;cursor:pointer;}

/* LOBBY STATS */
.stats-row{display:flex;gap:6px;margin-bottom:16px;}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--border);padding:10px;text-align:center;}
.stat-val{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);}
.stat-lbl{font-size:0.45rem;color:var(--muted);text-transform:uppercase;margin-top:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Noir<span> · </span>Casino</div>
  <div class="balance-chip">
    <div class="lbl">Баланс</div>
    <div class="amt" id="balDisp">1 000 ₽</div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="goTab('lobby',this)">Лобби</button>
  <button class="nav-btn" onclick="goTab('slots',this)">Слоты</button>
  <button class="nav-btn" onclick="goTab('roulette',this)">Рулетка</button>
  <button class="nav-btn" onclick="goTab('miner',this)">Майнер</button>
</div>

<div class="screen active" id="tab-lobby">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="stWins">0</div><div class="stat-lbl">Побед</div></div>
    <div class="stat-card"><div class="stat-val" id="stLoss">0</div><div class="stat-lbl">Поражений</div></div>
    <div class="stat-card"><div class="stat-val" id="stBest">0₽</div><div class="stat-lbl">Рекорд</div></div>
  </div>
  <p style="text-align:center; color:var(--muted); font-size:0.7rem; letter-spacing:1px;">ВЫБЕРИТЕ ИГРУ В МЕНЮ ВЫШЕ</p>
</div>

<div id="universal-bet-ui" class="screen">
  <div class="bet-control-panel">
    <div class="lbl" style="margin-bottom:5px;">Ваша Ставка:</div>
    <div class="bet-input-row">
      <div class="bet-input-wrapper">
        <input type="number" class="bet-input" id="mainBetInput" value="10" min="1">
      </div>
    </div>
    <div class="bet-grid">
      <button class="b-btn" onclick="modBet(10)">+10</button>
      <button class="b-btn" onclick="modBet(25)">+25</button>
      <button class="b-btn" onclick="modBet(50)">+50</button>
      <button class="b-btn" onclick="modBet(100)">+100</button>
    </div>
    <div class="bet-action-grid">
      <button class="b-btn special" onclick="modBet('all')">ВА-БАНК</button>
      <button class="b-btn reset" onclick="modBet('reset')">СБРОСИТЬ</button>
    </div>
  </div>
</div>

<div class="screen" id="tab-slots">
    <div class="panel">
        <div class="reels">
          <div class="reel" id="rv0">7</div>
          <div class="reel" id="rv1">7</div>
          <div class="reel" id="rv2">7</div>
        </div>
    </div>
    <div class="result-msg" id="slotMsg">Удачи!</div>
    <button class="main-btn" id="slotBtn" onclick="spinSlots()">ИГРАТЬ</button>
</div>

<div class="screen" id="tab-roulette">
    <div class="panel">
        <div class="r-num green-c" id="rNum">—</div>
        <div class="lbl" id="rColorLbl" style="text-align:center; margin-top:5px;">Сделайте ставку</div>
    </div>
    <div class="bet-types" style="margin-bottom:15px;">
        <div class="btype" onclick="selRouBet('red',this)" style="border-left:3px solid #e74c3c">Красное</div>
        <div class="btype" onclick="selRouBet('black',this)" style="border-left:3px solid #444">Черное</div>
        <div class="btype" onclick="selRouBet('zero',this)" style="border-left:3px solid #2ecc71">Зеро</div>
    </div>
    <div class="result-msg" id="rouMsg">Выберите цвет</div>
    <button class="main-btn" id="rouBtn" onclick="spinRoulette()">КРУТИТЬ</button>
</div>

<div class="screen" id="tab-miner">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <select id="bombCount" style="background:#111; color:#fff; border:1px solid #333; padding:5px;">
            <option value="3">3 бомбы</option>
            <option value="5" selected>5 бомб</option>
            <option value="10">10 бомб</option>
        </select>
        <div id="minerMult" style="color:var(--gold); font-weight:700;">x1.00</div>
    </div>
    <div class="miner-grid" id="minerGrid"></div>
    <div class="result-msg" id="minerMsg">Начните игру</div>
    <button class="cashout-btn" id="cashoutBtn" onclick="minerCashout()" disabled>ЗАБРАТЬ</button>
    <button class="main-btn" id="minerStartBtn" onclick="startMiner()">ИГРАТЬ</button>
</div>

<script>
let bal = 1000, wins = 0, losses = 0, bestWin = 0;
let rouBetType = null;
let minerActive = false, minerBombs = [], minerOpened = 0, minerMult = 1;

function fmt(n){ return n.toLocaleString() + ' ₽'; }

// Вибрация ТОЛЬКО при победе
function vWin() {
    if (navigator.vibrate) navigator.vibrate(15);
}

function updBal(net) {
    bal += net;
    if (net > 0) {
        wins++;
        vWin();
        if (net > bestWin) bestWin = net;
    } else if (net < 0) {
        losses++;
    }
    
    if (bal <= 0) bal = 100; // Авто-пополнение

    document.getElementById('balDisp').textContent = fmt(bal);
    document.getElementById('stWins').textContent = wins;
    document.getElementById('stLoss').textContent = losses;
    document.getElementById('stBest').textContent = fmt(bestWin);
}

function modBet(val) {
    let input = document.getElementById('mainBetInput');
    let current = parseInt(input.value) || 0;
    if (val === 'all') input.value = bal;
    else if (val === 'reset') input.value = 0;
    else input.value = current + val;
}

function getBet() {
    return parseInt(document.getElementById('mainBetInput').value) || 0;
}

function goTab(id, btn) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById('tab-' + id).classList.add('active');
    if (id !== 'lobby') {
        document.getElementById('universal-bet-ui').classList.add('active');
    }
    if (btn) btn.classList.add('active');
}

// SLOTS
function spinSlots() {
    let bet = getBet();
    if (bet > bal || bet <= 0) return;
    updBal(-bet);
    
    const symbols = ['7', '💎', '⭐', '🍒', '🔔'];
    let res = [symbols[Math.floor(Math.random()*5)], symbols[Math.floor(Math.random()*5)], symbols[Math.floor(Math.random()*5)]];
    
    document.getElementById('rv0').textContent = res[0];
    document.getElementById('rv1').textContent = res[1];
    document.getElementById('rv2').textContent = res[2];
    
    let win = 0;
    if (res[0] === res[1] && res[1] === res[2]) {
        win = res[0] === '7' ? bet * 50 : bet * 10;
    } else if (res[0] === res[1] || res[1] === res[2] || res[0] === res[2]) {
        win = bet * 2;
    }
    
    let msg = document.getElementById('slotMsg');
    if (win > 0) {
        msg.className = "result-msg win";
        msg.textContent = "ПОБЕДА! +" + win;
        updBal(win);
    } else {
        msg.className = "result-msg lose";
        msg.textContent = "Проигрыш -" + bet;
    }
}

// ROULETTE
function selRouBet(t, btn) {
    rouBetType = t;
    document.querySelectorAll('.btype').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
}

function spinRoulette() {
    let bet = getBet();
    if (!rouBetType || bet > bal || bet <= 0) return;
    updBal(-bet);
    
    let num = Math.floor(Math.random() * 37);
    let color = num === 0 ? 'green' : ([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(num) ? 'red' : 'black');
    
    let disp = document.getElementById('rNum');
    disp.textContent = num;
    disp.className = "r-num " + (color === 'green' ? 'green-c' : color);
    
    let win = 0;
    if (rouBetType === color) win = color === 'green' ? bet * 35 : bet * 2;
    
    let msg = document.getElementById('rouMsg');
    if (win > 0) {
        msg.className = "result-msg win";
        msg.textContent = "ВЫИГРЫШ! +" + win;
        updBal(win);
    } else {
        msg.className = "result-msg lose";
        msg.textContent = "Мимо -" + bet;
    }
}

// MINER
function buildGrid() {
    let g = document.getElementById('minerGrid');
    g.innerHTML = '';
    for(let i=0; i<25; i++) {
        let c = document.createElement('div');
        c.className = 'mine-cell';
        c.onclick = () => openMine(i);
        g.appendChild(c);
    }
}

function startMiner() {
    let bet = getBet();
    if (bet > bal || bet <= 0) return;
    updBal(-bet);
    
    minerActive = true; minerOpened = 0; minerMult = 1;
    let bCount = parseInt(document.getElementById('bombCount').value);
    minerBombs = [];
    while(minerBombs.length < bCount) {
        let r = Math.floor(Math.random()*25);
        if(!minerBombs.includes(r)) minerBombs.push(r);
    }
    
    buildGrid();
    document.getElementById('minerStartBtn').disabled = true;
    document.getElementById('cashoutBtn').disabled = false;
    document.getElementById('minerMsg').textContent = "Ищите алмазы...";
    document.getElementById('minerMult').textContent = "x1.00";
}

function openMine(i) {
    if (!minerActive) return;
    let cells = document.querySelectorAll('.mine-cell');
    if (cells[i].classList.contains('opened')) return;
    
    if (minerBombs.includes(i)) {
        cells[i].classList.add('opened', 'bomb');
        cells[i].textContent = '💣';
        minerActive = false;
        document.getElementById('minerMsg').textContent = "БОМБА! Вы проиграли.";
        document.getElementById('minerStartBtn').disabled = false;
        document.getElementById('cashoutBtn').disabled = true;
    } else {
        cells[i].classList.add('opened', 'safe');
        cells[i].textContent = '💎';
        minerOpened++;
        let bCount = parseInt(document.getElementById('bombCount').value);
        minerMult = (1 / ((25 - minerOpened - bCount + 1) / (25 - minerOpened + 1))) * minerMult * 0.96;
        document.getElementById('minerMult').textContent = "x" + minerMult.toFixed(2);
    }
}

function minerCashout() {
    if (!minerActive || minerOpened === 0) return;
    let win = Math.floor(getBet() * minerMult);
    updBal(win);
    minerActive = false;
    document.getElementById('minerMsg').textContent = "Забрали " + win + " ₽";
    document.getElementById('minerStartBtn').disabled = false;
    document.getElementById('cashoutBtn').disabled = true;
}

buildGrid();
</script>
</body>
</html>
