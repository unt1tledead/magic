<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Emerald Casino v2.0</title>
    <style>
        :root {
            --bg-dark: #0a0b0c;
            --card-bg: #14171a;
            --emerald-dark: #064e3b;
            --emerald-mid: #059669;
            --emerald-light: #10b981;
            --tg-blue: #3390ec;
            --text-main: #ffffff;
            --text-gray: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header & Balance */
        .header {
            padding: 20px;
            text-align: center;
        }

        .status-container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #222;
            display: inline-block;
            width: 85%;
            max-width: 320px;
        }

        .rank-label {
            font-size: 10px;
            color: var(--emerald-light);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .balance-display {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .xp-bg {
            width: 100%;
            height: 4px;
            background: #1e293b;
            border-radius: 10px;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--emerald-dark), var(--emerald-light));
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Game Screens */
        .viewport {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 100px;
        }

        .screen {
            display: none;
            width: 90%;
            max-width: 360px;
            animation: slideIn 0.3s ease;
        }

        .screen.active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Emerald UI Elements */
        .display-area {
            background: #000;
            padding: 30px 15px;
            border-radius: 24px;
            border: 2px solid var(--emerald-dark); /* Изумрудная обводка */
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(6, 78, 59, 0.5);
        }

        .slots-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 50px;
        }

        .btn-play {
            background: linear-gradient(135deg, var(--emerald-dark), var(--emerald-mid));
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-play:active { transform: scale(0.96); filter: brightness(1.1); }
        .btn-play:disabled { background: #222; color: #555; }

        /* Navigation Pills */
        .nav-pills {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 23, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 6px;
            border-radius: 100px;
            display: flex;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .pill {
            padding: 12px 30px;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: var(--text-gray);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .pill.active {
            background: var(--tg-blue);
            color: white;
        }

        /* Animations */
        .spinning { animation: blurAnim 0.1s infinite; }
        @keyframes blurAnim {
            0% { filter: blur(0); transform: translateY(0); }
            50% { filter: blur(4px); transform: translateY(2px); }
            100% { filter: blur(0); transform: translateY(0); }
        }

        .win-msg {
            color: var(--emerald-light);
            font-weight: bold;
            height: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="status-container">
            <div id="rank-name" class="rank-label">ЗАГРУЗКА...</div>
            <div class="balance-display">$<span id="balance">0</span></div>
            <div class="xp-bg">
                <div id="xp-bar" class="xp-fill"></div>
            </div>
        </div>
    </div>

    <div class="viewport">
        <div id="tab-slots" class="screen active">
            <div id="slot-status" class="win-msg" style="text-align: center;"></div>
            <div class="display-area">
                <div class="slots-grid">
                    <span id="s1">🎰</span>
                    <span id="s2">🎰</span>
                    <span id="s3">🎰</span>
                </div>
            </div>
            <button id="btn-spin" class="btn-play" onclick="logicSlots()">КРУТИТЬ ($10)</button>
            <p style="text-align:center; color: var(--text-gray); font-size: 12px; margin-top: 10px;">Ставка $10 | +5 XP</p>
        </div>

        <div id="tab-roulette" class="screen">
            <div id="roulette-status" class="win-msg" style="text-align: center;"></div>
            <div class="display-area">
                <div id="r-val" style="font-size: 64px; font-weight: 800; text-align: center;">0</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-play" style="background: #991b1b;" onclick="logicRoulette('red')">КРАСНОЕ</button>
                <button class="btn-play" style="background: #111; border: 1px solid #333;" onclick="logicRoulette('black')">ЧЕРНОЕ</button>
            </div>
            <p style="text-align:center; color: var(--text-gray); font-size: 12px; margin-top: 10px;">Ставка $50 | +15 XP</p>
        </div>
    </div>

    <nav class="nav-pills">
        <button class="pill active" onclick="nav('tab-slots', this)">Слоты</button>
        <button class="pill" onclick="nav('tab-roulette', this)">Рулетка</button>
    </nav>

    <script>
        // --- 1. ГЛОБАЛЬНОЕ СОСТОЯНИЕ (ЛОГИКА СОХРАНЕНИЯ) ---
        let game = JSON.parse(localStorage.getItem('casino_save_v2')) || {
            money: 1000,
            xp: 0
        };

        const ranks = ["Новичок", "Местный", "Игрок", "Фартовый", "Профи", "Капиталист", "Акула", "Магнат", "Олигарх", "VIP", "Элита", "Золотой", "Платиновый", "Алмазный", "Легенда"];
        const icons = ['🍒', '🍇', '💎', '💰', '🍀', '7️⃣'];
        
        // Коэффициенты выплат
        const multipliers = { '7️⃣': 50, '💎': 20, '💰': 15, '🍀': 10, '🍇': 5, '🍒': 3 };

        function updateUI() {
            localStorage.setItem('casino_save_v2', JSON.stringify(game));
            
            // Расчет уровня (каждые 100 XP)
            const lvl = Math.floor(game.xp / 100) + 1;
            const rank = ranks[Math.min(lvl - 1, ranks.length - 1)];
            
            document.getElementById('balance').innerText = game.money.toLocaleString();
            document.getElementById('rank-name').innerText = `${rank} • УРОВЕНЬ ${lvl}`;
            document.getElementById('xp-bar').style.width = (game.xp % 100) + '%';
        }

        function nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            document.getElementById('slot-status').innerText = "";
            document.getElementById('roulette-status').innerText = "";
        }

        // --- 2. ЛОГИКА СЛОТОВ ---
        function logicSlots() {
            if (game.money < 10) return alert("Недостаточно средств!");
            
            game.money -= 10;
            document.getElementById('slot-status').innerText = "";
            const btn = document.getElementById('btn-spin');
            btn.disabled = true;

            const sElements = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
            sElements.forEach(s => s.classList.add('spinning'));

            setTimeout(() => {
                const results = sElements.map(s => {
                    s.classList.remove('spinning');
                    const pick = icons[Math.floor(Math.random() * icons.length)];
                    s.innerText = pick;
                    return pick;
                });

                // Проверка выигрыша (Логика совпадений)
                if (results[0] === results[1] && results[1] === results[2]) {
                    const symbol = results[0];
                    const winAmount = 10 * multipliers[symbol];
                    game.money += winAmount;
                    document.getElementById('slot-status').innerText = `ВЫИГРЫШ: $${winAmount}!`;
                } else if (results[0] === results[1] || results[1] === results[2]) {
                    // Утешительный приз за 2 совпадения
                    game.money += 5;
                    document.getElementById('slot-status').innerText = "Пара! Возврат $5";
                }

                game.xp += 5;
                btn.disabled = false;
                updateUI();
            }, 1000);
        }

        // --- 3. ЛОГИКА РУЛЕТКИ ---
        function logicRoulette(betType) {
            if (game.money < 50) return alert("Ставка $50!");
            
            game.money -= 50;
            const num = Math.floor(Math.random() * 37); // 0-36
            const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            
            const color = num === 0 ? 'green' : (redNums.includes(num) ? 'red' : 'black');
            
            const rDisplay = document.getElementById('r-val');
            rDisplay.innerText = num;
            rDisplay.style.color = color === 'red' ? '#ef4444' : (color === 'black' ? '#fff' : '#22c55e');

            const status = document.getElementById('roulette-status');
            if (betType === color) {
                game.money += 100;
                status.innerText = "ПОБЕДА! +$100";
            } else {
                status.innerText = "ПРОИГРЫШ";
            }

            game.xp += 15;
            updateUI();
        }

        // Старт
        updateUI();
    </script>
</body>
</html>
