<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Emerald Casino Pro</title>
    <style>
        :root {
            --bg-dark: #0a0b0c;
            --card-bg: #14171a;
            --emerald-dark: #064e3b;
            --emerald-mid: #059669;
            --emerald-light: #10b981;
            --tg-blue: #3390ec;
            --text-main: #ffffff;
            --text-gray: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER AREA --- */
        .header {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .status-widget {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 24px;
            border: 1px solid #222;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .rank-badge {
            font-size: 10px;
            color: var(--emerald-light);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .balance-main {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            font-variant-numeric: tabular-nums;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--emerald-dark), var(--emerald-light));
            width: 0%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px var(--emerald-mid);
        }

        /* --- GAME VIEWPORT --- */
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 100px;
        }

        .game-panel {
            display: none;
            width: 90%;
            max-width: 380px;
            animation: app-fade 0.3s ease-out;
        }

        .game-panel.active { display: block; }

        @keyframes app-fade {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- SLOTS & ROULETTE BOX --- */
        .emerald-box {
            background: #000;
            padding: 40px 20px;
            border-radius: 32px;
            border: 2px solid var(--emerald-dark);
            margin-bottom: 24px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(6, 78, 59, 0.4);
        }

        .slot-reels {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 56px;
        }

        .reel-item {
            transition: all 0.1s;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--emerald-dark) 0%, var(--emerald-mid) 100%);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 20px;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(5, 150, 105, 0.2);
            transition: transform 0.1s, filter 0.2s;
        }

        .btn-action:active { transform: scale(0.96); filter: brightness(1.2); }
        .btn-action:disabled { background: #222; color: #555; box-shadow: none; cursor: not-allowed; }

        /* --- NAVIGATION PILLS --- */
        .nav-pills {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 23, 26, 0.9);
            backdrop-filter: blur(20px);
            padding: 6px;
            border-radius: 100px;
            display: flex;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 1000;
        }

        .pill-btn {
            padding: 12px 28px;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: var(--text-gray);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pill-btn.active {
            background: var(--tg-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(51, 144, 236, 0.3);
        }

        /* --- UTILS --- */
        .spinning { animation: reel-blur 0.1s infinite; }
        @keyframes reel-blur {
            0% { filter: blur(0); transform: translateY(0); }
            50% { filter: blur(5px); transform: translateY(3px); }
            100% { filter: blur(0); transform: translateY(0); }
        }

        .win-toast {
            position: absolute;
            top: -40px;
            left: 0;
            right: 0;
            text-align: center;
            color: var(--emerald-light);
            font-weight: 800;
            font-size: 18px;
            pointer-events: none;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            color: var(--text-gray);
            font-size: 12px;
            margin-top: 14px;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="status-widget">
            <div id="rank-display" class="rank-badge">НОВИЧОК • УРОВЕНЬ 1</div>
            <div class="balance-main">$<span id="balance-val">0</span></div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="main-view">
        <div id="view-slots" class="game-panel active">
            <div class="emerald-box">
                <div id="slot-notif" class="win-toast"></div>
                <div class="slot-reels">
                    <div id="r1" class="reel-item">🎰</div>
                    <div id="r2" class="reel-item">🎰</div>
                    <div id="r3" class="reel-item">🎰</div>
                </div>
            </div>
            <button id="btn-spin" class="btn-action" onclick="coreSlots()">КРУТИТЬ ($10)</button>
            <div class="info-row">
                <span>Ставка: $10</span>
                <span>Опыт: +5 XP</span>
            </div>
        </div>

        <div id="view-roulette" class="game-panel">
            <div class="emerald-box">
                <div id="roulette-notif" class="win-toast"></div>
                <div id="roulette-res" style="font-size: 64px; font-weight: 900; text-align: center;">?</div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="btn-action" style="background: #991b1b;" onclick="coreRoulette('red')">КРАСНОЕ</button>
                <button class="btn-action" style="background: #111; border: 1px solid #333;" onclick="coreRoulette('black')">ЧЕРНОЕ</button>
            </div>
            <div class="info-row">
                <span>Ставка: $50</span>
                <span>Опыт: +15 XP</span>
            </div>
        </div>
    </div>

    <nav class="nav-pills">
        <button class="pill-btn active" onclick="switchTab('view-slots', this)">Слоты</button>
        <button class="pill-btn" onclick="switchTab('view-roulette', this)">Рулетка</button>
    </nav>

    <script>
        // ==========================================
        // ГЛОБАЛЬНОЕ ЯДРО ЛОГИКИ (Твой оригинальный уровень)
        // ==========================================
        
        let state = JSON.parse(localStorage.getItem('casino_core_state')) || {
            balance: 1000,
            xp: 0,
            totalSpins: 0,
            wins: 0
        };

        const config = {
            symbols: ['🍒', '🍋', '🍇', '💎', '🔔', '7️⃣'],
            multipliers: { '7️⃣': 100, '💎': 40, '🔔': 20, '🍇': 10, '🍋': 5, '🍒': 2 },
            ranks: ["Новичок", "Бродяга", "Игрок", "Фартовый", "Профи", "Хайроллер", "Магнат", "Акула", "Миллионер", "VIP", "Элита", "Мастер", "Властелин", "Бог Казино", "Легенда"],
            xpPerLevel: 100
        };

        // Сохранение и обновление интерфейса
        function sync() {
            localStorage.setItem('casino_core_state', JSON.stringify(state));
            
            const lvl = Math.floor(state.xp / config.xpPerLevel) + 1;
            const rankIdx = Math.min(lvl - 1, config.ranks.length - 1);
            
            document.getElementById('balance-val').innerText = state.balance.toLocaleString();
            document.getElementById('rank-display').innerText = `${config.ranks[rankIdx]} • УРОВЕНЬ ${lvl}`;
            document.getElementById('progress-bar').style.width = (state.xp % config.xpPerLevel) + '%';
        }

        // Переключение вкладок
        function switchTab(id, btn) {
            document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            clearNotifs();
        }

        function clearNotifs() {
            document.getElementById('slot-notif').innerText = "";
            document.getElementById('roulette-notif').innerText = "";
        }

        // --- ЛОГИКА СЛОТОВ ---
        async function coreSlots() {
            if (state.balance < 10) return alert("Недостаточно средств!");

            state.balance -= 10;
            state.totalSpins++;
            sync();

            const btn = document.getElementById('btn-spin');
            btn.disabled = true;
            clearNotifs();

            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            reels.forEach(r => r.classList.add('spinning'));

            // Имитация задержки и остановки по одному
            for (let i = 0; i < reels.length; i++) {
                await new Promise(res => setTimeout(res, 600 + (i * 300)));
                reels[i].classList.remove('spinning');
                reels[i].innerText = config.symbols[Math.floor(Math.random() * config.symbols.length)];
            }

            const res = reels.map(r => r.innerText);
            checkWin(res);
            
            state.xp += 5;
            btn.disabled = false;
            sync();
        }

        function checkWin(res) {
            const notif = document.getElementById('slot-notif');
            // Три в ряд
            if (res[0] === res[1] && res[1] === res[2]) {
                const prize = 10 * config.multipliers[res[0]];
                state.balance += prize;
                state.wins++;
                notif.innerText = `JACKPOT: +$${prize}!`;
            } 
            // Два в ряд
            else if (res[0] === res[1] || res[1] === res[2] || res[0] === res[2]) {
                state.balance += 5;
                notif.innerText = "Малый выигрыш: +$5";
            }
        }

        // --- ЛОГИКА РУЛЕТКИ ---
        function coreRoulette(bet) {
            if (state.balance < 50) return alert("Ставка $50!");

            state.balance -= 50;
            clearNotifs();

            const num = Math.floor(Math.random() * 37);
            const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            const color = num === 0 ? 'green' : (redNums.includes(num) ? 'red' : 'black');

            const display = document.getElementById('roulette-res');
            display.innerText = num;
            display.style.color = color === 'red' ? 'var(--danger)' : (color === 'black' ? '#fff' : 'var(--emerald-light)');

            const notif = document.getElementById('roulette-notif');
            if (bet === color) {
                state.balance += 100;
                notif.innerText = "ПОБЕДА: +$100";
                state.wins++;
            } else {
                notif.innerText = "ПРОИГРЫШ";
            }

            state.xp += 15;
            sync();
        }

        // Первая инициализация
        sync();
    </script>
</body>
</html>
